<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hospital Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
}

body {
    display: flex;
    height: 100vh;
    background: #f4f7fc;
}

/* SIDEBAR */
.sidebar {
    width: 240px;
    background: #ffffff;
    padding: 20px;
    box-shadow: 2px 0 10px rgba(0,0,0,0.05);
}

.logo {
    font-size: 22px;
    font-weight: bold;
    color: #2563eb;
    margin-bottom: 30px;
}

.nav-item {
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    background: #f1f5ff;
    transition: 0.3s;
}

.nav-item:hover {
    background: #dbe7ff;
}

/* MAIN AREA */
.main {
    flex: 1;
    padding: 25px;
}

.header {
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 20px;
}

/* CARDS */
.card {
    background: white;
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    cursor: pointer;
}

.card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.card-content {
    display: none;
    margin-top: 15px;
}

/* CHAT BOX */
.chat-box {
    height: 200px;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 10px;
    overflow-y: auto;
    background: #fafafa;
}

.chat-input {
    margin-top: 10px;
    display: flex;
}

.chat-input input {
    flex: 1;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
}

.chat-input button {
    margin-left: 10px;
    padding: 10px 15px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

/* VIDEO */
.video-box {
    height: 250px;
    background: #000;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
}

/* UPLOAD */
.upload-area {
    border: 2px dashed #2563eb;
    padding: 30px;
    text-align: center;
    border-radius: 12px;
    background: #f8fbff;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">🏥 MediConnect</div>

    <div class="nav-item" onclick="toggleCard('chatCard')">
        Chat Box <span>›</span>
    </div>

    <div class="nav-item" onclick="toggleCard('videoCard')">
        Video Call <span>›</span>
    </div>

    <div class="nav-item" onclick="toggleCard('reportCard')">
        Upload Report <span>›</span>
    </div>
</div>

<!-- MAIN -->
<div class="main">
    <div class="header">Patient Dashboard</div>

    <!-- CHAT -->
    <div class="card" id="chatCard">
        <div class="card-header">
            <h3>Doctor Chat</h3>
            <span>›</span>
        </div>
        <div class="card-content">
            <div class="chat-box" id="chatBox">
                <p><b>Doctor:</b> How are you feeling today?</p>
            </div>

            <div class="chat-input">
                <input type="text" id="msg" placeholder="Type message...">
                <button onclick="sendMsg()">Send</button>
            </div>
        </div>
    </div>

    <!-- VIDEO -->
    <div class="card" id="videoCard">
        <div class="card-header">
            <h3>Video Consultation</h3>
            <span>›</span>
        </div>
        <div class="card-content">
            <div class="video-box">
                Live Video Call Area
            </div>
        </div>
    </div>

    <!-- REPORT -->
    <div class="card" id="reportCard">
        <div class="card-header">
            <h3>Upload Final Report</h3>
            <span>›</span>
        </div>
        <div class="card-content">
            <div class="upload-area">
                <p>Drag & Drop your report here</p>
                <input type="file">
            </div>
        </div>
    </div>

</div>

<script>
function toggleCard(id) {
    const card = document.getElementById(id);
    const content = card.querySelector(".card-content");

    if (content.style.display === "block") {
        content.style.display = "none";
    } else {
        content.style.display = "block";
    }
}

// simple chat
function sendMsg() {
    let input = document.getElementById("msg");
    let box = document.getElementById("chatBox");

    if (input.value.trim() !== "") {
        let p = document.createElement("p");
        p.innerHTML = "<b>You:</b> " + input.value;
        box.appendChild(p);
        input.value = "";
        box.scrollTop = box.scrollHeight;
    }
}
</script>

</body>
</html>
