<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Session | MediConnect</title>
    <link rel="stylesheet" href="create-session.css">
</head>
<body>

<div class="main-container">

    <div class="form-card">
        <div class="form-header">
            <div class="icon-circle">🩺</div>
            <div>
                <h1>Create New Session</h1>
                <p>Fill in patient and clinic details</p>
            </div>
        </div>

        <form action="session-success.html">

            <div class="form-grid">

                <div class="input-group">
                    <label>Health ID</label>
                    <input type="text" placeholder="Enter Health ID" required>
                </div>

                <div class="input-group">
                    <label>Clinic ID</label>
                    <input type="text" placeholder="Enter Clinic ID" required>
                </div>

                <div class="input-group">
                    <label>Assigned Doctor ID</label>
                    <input type="text" placeholder="Enter Doctor ID" required>
                </div>

                <div class="input-group">
                    <label>Patient Name</label>
                    <input type="text" placeholder="Enter Patient Name" required>
                </div>

                <div class="input-group full-width">
                    <label>Department</label>
                    <select required>
                        <option>Select Department</option>
                        <option>General Medicine</option>
                        <option>Ophthalmology</option>
                        <option>Otolaryngology (ENT)</option>
                        <option>Cardiology</option>
                        <option>Orthopedics</option>
                        <option>Neurology</option>
                        <option>Gastroenterology</option>
                        <option>Dermatology</option>
                        <option>OB-GYN</option>
                        <option>Pediatrics</option>
                        <option>Psychiatry</option>
                        <option>Urology</option>
                    </select>
                </div>

            </div>

            <div class="button-group">
                <button type="button" class="cancel-btn">Cancel</button>
                <button type="submit" class="start-btn">
                    ▶ Start Session
                </button>
            </div>

        </form>
    </div>

</div>

</body>
</html>
