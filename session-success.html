<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Started | MediConnect</title>
    <link rel="stylesheet" href="create-session.css">
</head>
<body>

<div class="success-container">

    <div class="success-card">

        <div class="success-icon">
            ✅
        </div>

        <h1>Session Started Successfully!</h1>
        <p>Your medical session has been created.</p>

        <div class="session-details">

            <div class="detail-box">
                <span>Session ID</span>
                <strong>MC-2045</strong>
            </div>

            <div class="detail-box">
                <span>Patient Name</span>
                <strong>John Doe</strong>
            </div>

            <div class="detail-box">
                <span>Clinic Name</span>
                <strong>CityCare Clinic</strong>
            </div>

            <div class="detail-box">
                <span>Doctor Name</span>
                <strong>Dr. Sarah Johnson</strong>
            </div>

        </div>

        <button class="dashboard-btn">
            Go to Dashboard →
        </button>

    </div>

</div>

</body>
</html>
