<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MediConnect - Consultation</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: 'Inter', sans-serif; height: 100vh; display: flex; overflow: hidden; }
        
        /* Layout */
        .sidebar { width: 260px; background: #262626; display: flex; flex-direction: column; gap: 10px; padding: 15px; border-right: 1px solid #404040; }
        .main-stage { flex: 1; display: flex; flex-direction: column; position: relative; }

        /* Video Tiles */
        .video-tile { background: #333; border-radius: 8px; aspect-ratio: 16/9; cursor: pointer; border: 2px solid transparent; display: flex; align-items: center; justify-content: center; position: relative; }
        .video-tile:hover { border-color: #4b8ced; }
        .video-tile.pinned { border: 2px solid #f5f2ee; }
        .video-tile video,
        .viewport video{
            width:100%;
            height:100%;
            object-fit:cover;
            border-radius:8px;
        }
        .participant-name{
            position:absolute;
            bottom:10px;
            left:10px;
            background:rgba(0,0,0,0.55);
            padding:5px 10px;
            border-radius:5px;
            font-size:14px;
            z-index:20;
        }
        .main-participant-name{
            font-size:18px;
        }
        .camera-off-overlay{
            position:absolute;
            inset:0;
            display:none;
            justify-content:center;
            align-items:center;
            background:#333;
            z-index:10;
        }
        .camera-off-overlay svg{
            width:42px;
            height:42px;
        }
        /* Main View */
        .viewport{
            flex:1;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:1.5rem;
            color:#666;

            position:relative;
            overflow:hidden;
        }
        /* Fixed Zoom-style Controls */
        .toolbar { height: 80px; background: #000; display: flex; justify-content: center; align-items: center; gap: 40px; border-top: 1px solid #333; }
        .ctrl-btn { display: flex; flex-direction: column; align-items: center; gap: 5px; color: white; cursor: pointer; border: none; background: none; font-size: 0.8rem; }
        
        /* Notes Panel */
        #notesPanel { position: absolute; top: 0; right: -350px; width: 350px; height: 100%; background: white; color: #333; transition: 0.3s; box-shadow: -5px 0 15px rgba(0,0,0,0.3); z-index: 10; display: flex; flex-direction: column; }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="video-tile pinned" onclick="pinVideo('patient')">
        <video id="patientVideo" autoplay playsinline muted></video>
        <div class="camera-off-overlay" id="patientCameraOff">
            <i data-lucide="video-off"></i>
        </div>
        <div class="participant-name" id="patientName">
            Patient
        </div>
    </div>

    <div class="video-tile" onclick="pinVideo('doctor1')">
        <video id="doctor1Video" autoplay playsinline muted></video>
        <div class="camera-off-overlay" id="doctor1CameraOff">
            <i data-lucide="video-off"></i>
        </div>
        <div class="participant-name" id="doctor1Name">
            Doctor 1
        </div>
    </div>

    <div class="video-tile" onclick="pinVideo('doctor2')">
        <video id="doctor2Video" autoplay playsinline muted></video>
        <div class="camera-off-overlay" id="doctor2CameraOff">
            <i data-lucide="video-off"></i>
        </div>
        <div class="participant-name" id="doctor2Name">
            Doctor 2
        </div>
    </div>

</div>

<div class="main-stage">
    <div class="viewport">
        <video id="mainVideo" autoplay playsinline></video>
        <div class="camera-off-overlay main-camera-off" id="mainCameraOff">
            <i data-lucide="video-off"></i>
        </div>
        <div class="participant-name main-participant-name" id="mainParticipantName">
            Patient
        </div>
    </div>
    
    <div class="toolbar">
        <button class="ctrl-btn"><i data-lucide="mic"></i>Mute</button>
        <button class="ctrl-btn"><i data-lucide="video"></i>Stop Video</button>
        <button class="ctrl-btn"><i data-lucide="monitor-up"></i>Share</button>
        <button class="ctrl-btn" onclick="toggleNotes()"><i data-lucide="file-text"></i>Notes</button>
        <button class="ctrl-btn" style="color: #ef4444;" onclick="location.href='report_submission.html'"><i data-lucide="phone-off"></i>End</button>
    </div>
</div>

<div id="notesPanel">
    <div style="padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between;">
        <strong>Clinical Notes</strong>
        <i data-lucide="x" onclick="toggleNotes()" style="cursor:pointer"></i>
    </div>
    <textarea style="flex:1; border:none; padding:15px; resize:none;">These notes are not permanent, just for temporary purpose</textarea>
</div>

<script>
    lucide.createIcons();
    // document.getElementById("patientCameraOff").style.display = "none";
    // document.getElementById("doctor1CameraOff").style.display = "none";
    // document.getElementById("doctor2CameraOff").style.display = "none";
    // document.getElementById("mainCameraOff").style.display = "none";
    function pinVideo(name) {
        // document.getElementById('mainView').innerText = "Active Video: " + name;
    }

    function toggleNotes() {
        const panel = document.getElementById('notesPanel');
        panel.style.right = (panel.style.right === '0px') ? '-350px' : '0px';
    }
</script>
</body>
</html>
