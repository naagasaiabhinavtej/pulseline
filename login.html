<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediConnect Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
    body { background:#f8fbff; width:100%; height:100vh; overflow:hidden; }

    .container { width:100%; height:100vh; display:flex; }

    .left-panel {
        width: 40%;
        background: linear-gradient(165deg, #2563eb, #1d4ed8);
        color: white;
        padding: 80px;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }
    .error {
        color: red;
        font-size: 13px;
        margin-top: 4px;
        min-height: 16px;
    }
    .logo-container { display: flex; align-items: center; gap: 15px; font-size: 34px; font-weight: 700; margin-bottom: 60px; }
    .left-panel h1 { font-size: 42px; line-height: 1.2; margin-bottom: 30px; }
    .left-panel p { font-size: 18px; line-height: 1.6; color: #dbeafe; margin-bottom: 50px; }

    .feature { display:flex; align-items:center; gap:20px; margin-bottom:30px; font-size:18px; }
    .feature span { background: rgba(255,255,255,0.15); padding:12px; border-radius:12px; font-size:22px; }

    .right-panel { width:60%; background:white; padding:80px 100px; overflow-y:auto; }

    .header h2 { font-size:40px; color:#0f172a; font-weight:700; }

    .auth-mode { margin-bottom:25px; font-size:16px; color:#64748b; }
    .auth-mode span { color:#2563eb; font-weight:600; cursor:pointer; text-decoration:underline; }

    .role-tabs { display:flex; background:#eff6ff; border-radius:16px; padding:8px; margin-bottom:30px; width:400px; }
    .role-btn { flex:1; padding:18px; border:none; background:transparent; cursor:pointer; border-radius:12px; font-weight:600; font-size:16px; }
    .role-btn.active { background:#2563eb; color:white; }

    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:24px; max-width:900px; }
    .full { grid-column: span 2; }

    input, select, textarea {
        width:100%;
        padding:20px;
        border:1px solid #cbd5e1;
        border-radius:14px;
        font-size:16px;
        outline:none;
    }

    .submit-btn {
        width:100%;
        max-width:900px;
        padding:20px;
        margin-top:30px;
        border:none;
        border-radius:14px;
        background:#2563eb;
        color:white;
        font-weight:600;
        font-size:18px;
        cursor:pointer;
    }
</style>
</head>

<body>

<div class="container">

<!-- LEFT -->
<div class="left-panel">
    <div class="logo-container">🏥 MediConnect</div>
    <h1>Healthcare Registration Portal</h1>
    <p>Securely onboard as a doctor or patient and manage medical records efficiently.</p>

    <div class="feature"><span>🔒</span> Secure Data Encryption</div>
    <div class="feature"><span>🩺</span> Real-time Session Management</div>
    <div class="feature"><span>📋</span> Medical Timeline Tracking</div>
</div>

<!-- RIGHT -->
<div class="right-panel">

    <div class="header">
        <h2 id="title">Create Your Account</h2>

        <div class="auth-mode" id="authModeText">
            Already registered? <span onclick="toggleAuth()">Log In</span>
        </div>
    </div>

    <div class="role-tabs">
        <button class="role-btn active" id="doctorBtn" onclick="setRole('doctor')">Doctor</button>
        <button class="role-btn" id="patientBtn" onclick="setRole('patient')">Patient</button>
    </div>

    <form id="form">

        <!-- REGISTER (UNCHANGED) -->
        <div id="doctorFields" class="form-grid">
            <input type="text" placeholder="Full Name" class="reg-only" id='name1' required>
            <div id="nameError" class="error"></div>
            <select class="reg-only" id='specialisation' required>
                <option value="" selected disabled>Select Specialization</option>
                <option>General Medicine</option>
                <option>Cardiology</option>
                <option>Ophthalmology </option>
                <option>Otolaryngology</option>
                <option>Orthopedics</option>
                <option>Neurology</option>
                <option>Gastroenterology</option>
                <option>Dermatology</option>
                <option>Pediatrics</option>
                <option>Psychiatry</option>
                <option>Urology</option>
            </select>
            <div id="specialisationError" class="error"></div>
            <input type="text" placeholder="Contact Number" class="reg-only" id = 'contact' required>
            <div id="contactError" class="error"></div>
            <input type="text" placeholder="Assigned Clinic ID" class="reg-only" id="clinic_id" required>
            <div id="clinicError" class="error"></div>
            <input type="password" placeholder="Password" class="full reg-only" id="password_by_user1" required>
            <div id="passwordError" class="error"></div>
        </div>

        <div id="patientFields" class="form-grid" style="display:none;">
            <input type="text" placeholder="Full Name" class="reg-only" id="name2" required>
            <input type="date" class="reg-only" id="date_of_birth" required>
            <select class="reg-only" id="gender"><option>Male</option><option>Female</option><option>Other</option></select>
            <select class="reg-only" id="blood_group" required>
                <option value="" selected disabled>Blood Group</option>
                <option>A+</option>
                <option>O+</option>
                <option>B+</option>
                <option>AB+</option>
                <option>A-</option>
                <option>O-</option>
                <option>B-</option>
                <option>AB-</option>
            </select>
            <input type="number" placeholder="Height (cm)" class="reg-only" id="height" required>
            <input type="number" placeholder="Weight (kg)" class="reg-only" id="weight" required>
            <textarea class="full reg-only" placeholder="Allergies (if any)" id="allergies"></textarea>
            <textarea class="full reg-only" placeholder="Medical History" id="medical_history"></textarea>
            <input type="password" placeholder="Password" class="full reg-only" id="password_by_user2" required>
        </div>

        <!-- LOGIN (UPDATED DYNAMIC LABELS) -->
        <div id="loginFields" class="form-grid" style="display:none;">
            <input type="number" id="loginId" placeholder="Doctor ID" required>
            <div id="iderror" style="color:red; font-size:14px; margin-top:5px;"></div>
            <input type="password" id="loginPassword" placeholder="Password" class="full" maxlength="32" required>
            <div id="password_error" style="color:red; font-size:14px; margin-top:5px;"></div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn" required>
            Complete Registration
        </button>

    </form>
</div>
</div>

<script>

let currentRole = "doctor";
let isLogin = false;

function setRole(role){
    currentRole = role;

    document.getElementById("doctorBtn").classList.toggle("active", role === "doctor");
    document.getElementById("patientBtn").classList.toggle("active", role === "patient");

    updateLoginPlaceholders();

    if(!isLogin){
        document.getElementById("doctorFields").style.display = role === "doctor" ? "grid" : "none";
        document.getElementById("patientFields").style.display = role === "patient" ? "grid" : "none";
    }
}

function updateLoginPlaceholders(){
    const idInput = document.getElementById("loginId");

    if(currentRole === "doctor"){
        idInput.placeholder = "Doctor ID";
    } else {
        idInput.placeholder = "Health ID";
    }
}

function toggleAuth(){
    isLogin = !isLogin;

    document.getElementById("title").innerText =
        isLogin ? "Sign In" : "Create Your Account";

    document.getElementById("submitBtn").innerText =
        isLogin ? "Log In" : "Complete Registration";

    document.getElementById("authModeText").innerHTML =
        isLogin
        ? 'New here? <span onclick="toggleAuth()">Register</span>'
        : 'Already registered? <span onclick="toggleAuth()">Log In</span>';

    const regFields = document.querySelectorAll(".reg-only");

    if(isLogin){
        document.getElementById("doctorFields").style.display = "none";
        document.getElementById("patientFields").style.display = "none";
        document.getElementById("loginFields").style.display = "grid";
        updateLoginPlaceholders();
    } else {
        document.getElementById("loginFields").style.display = "none";
        setRole(currentRole);
    }

    regFields.forEach(f => f.style.display = isLogin ? "none" : "block");
}

async function refreshtoken()
{
    const result = await fetch("/refresh",
        {
            method:"GET",
            credentials: "include"
        });
    if(result.ok)
    {
        const data = await result.json();
        window.accessToken = data.access_token;
        return data.access_token;
    }
    else
    {
        return null;
    }
}
async function logintransition()
{
    const result = await fetch("/loading", {
        method:"GET",
        credentials:"include"
    });
    if(result.ok)
    {
        const data = await result.json();
        const type = data.type;
        const access_token = await refreshtoken();
        if(access_token)
        {
            if(type === "doctor")
            {
                window.location.href ="index.html";
            }
            else if(type === "patient")
            {
                window.location.href = "patient_sessions.html";
            }
        }
    }
    else return;
}
logintransition();
const form = document.getElementById("form");
const a = document.getElementsByClassName("submit-btn");
const b = document.getElementById("loginId");
const c = document.getElementById("loginPassword");
const d = document.getElementById("name1");
const e1 = document.getElementById("specialisation");
const f = document.getElementById("contact");
const g = document.getElementById("clinic_id");
const h = document.getElementById("password_by_user1");
const i = document.getElementById("name2");
const j = document.getElementById("date_of_birth");
const k = document.getElementById("gender");
const l = document.getElementById("blood_group");
const m = document.getElementById("height");
const n = document.getElementById("weight");
const o = document.getElementById("password_by_user2");
h.addEventListener("input", validatepassword);
form.addEventListener("submit", async(e)=>
{   
    e.preventDefault(); //avoids the browser to do anything like in forms after that browswer gives submitted etc
    if(isLogin)
    {
        const id = b.value.trim();
        const password = c.value.trim();
        if(validateform1())
        {
            const answer = await fetch("/login",{
                method : "POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    person: currentRole,
                    id : id,
                    password : password
                })
            });
            if(answer.ok)
            {
                const data = await answer.json();
                if(currentRole === "doctor") window.location.href = "index.html";
                else if(currentRole === "patient") window.location.href = "patient_sessions.html";
            }
            else
            {
                const error = await answer.json();
                console.log(error);
            }
        }            
    }
    else
    {
        if(currentRole === "doctor")
        {
            const name = d.value.trim();
            const specialisation = e1.value.trim();
            const contact = f.value.trim();
            const assigned_clinic_id = g.value.trim();
            const password = h.value.trim();
            if(validateform2())
            {
                const results = await fetch("/register", {
                    method : "POST",
                    headers:{
                        "Content-Type":"application/json"
                    },
                    body: JSON.stringify({
                        person:"doctor",
                        name:name,
                        specialisation:specialisation,
                        contact:contact,
                        assigned_clinic_id:assigned_clinic_id,
                        password:password
                    })
                });
                if(results.ok)
                {
                    const data = await results.json();
                    window.location.href = "index.html";
                }
                else
                {
                    const error = await results.json();
                    console.log("error");
                }
            }
        }
        else
        {
            const name = i.value.trim();
            const date_of_birth = j.value.trim();
            const gender = k.value.trim();
            const blood_group  = l.value.trim();
            const height = m.value.trim();
            const weight = n.value.trim();
            const password = o.value.trim();
            if(validateform2())
            {
                const results = await fetch("/register", {
                    method : "POST",
                    headers:{
                        "Content-Type":"application/json"
                    },
                    body: JSON.stringify({
                        person:"patient",
                        name:name,
                        date_of_birth:date_of_birth,
                        gender:gender,
                        blood_group:blood_group,
                        height:height,
                        weight:weight,
                        password:password
                    })
                });
                if(results.ok)
                {
                    const data = await results.json();
                    window.location.href = "patient_sessions.html";
                }
                else
                {
                    const error = await results.json();
                    console.log("error");
                }
            }
        }
    }
});
function validateform1()
{
    document.getElementById("iderror").textContent = "";
    document.getElementById("password_error").textContent = "";
    const id = b.value.trim();
    const password = c.value.trim();
    const iderror = document.getElementById("iderror");
    const password_error = document.getElementById("password_error");
    if(id === "")
    {
        iderror.textContent = "Please enter your ID";
        return false;
    }
    if(password === "")
    {
        password_error.textContent = "Please enter your Password";
        return false;
    }
    return true;    
}
function validateform2()
{
    if(currentRole === 'doctor')
    {
        const name = d.value.trim();
        const specialisation = e1.value.trim();
        const contact = f.value.trim();
        const assigned_clinic_id = g.value.trim();
        const password = h.value.trim();
        if(name === "")
        {
            document.getElementById("nameError").textContent = "Please enter full name";
            return false;  
        }
        if(specialisation === "")
        {
            document.getElementById("specialisationError").textContent = "Select a specialization";
            return false; 
        }
        if(contact === "")
        {
            document.getElementById("contactError").textContent = "Enter valid contact number";
            return false; 
        }
        if(assigned_clinic_id === "")
        {
            document.getElementById("clinicError").textContent = "Clinic ID is required";
            return false; 
        }
        //validation for password
        const b = document.getElementById("passwordError")
        const hasUppercase = /[A-Z]/.test(password);
        const hasNumber = /[0-9]/.test(password);
        const hasSymbol = /[!@#$%^&*(),.?":{}|<>]/.test(password);
        if(password === "")
        {
            b.textContent = "Please enter your password";
            return false;
        }
        else if(password.length>=32)
        {
            b.textContent = "Only 32 chars allowed";
            return false;
        }
        else if(!hasUppercase)
        {
            b.textContent = "Password should have atleast one Capital character";
            return false;
        }
        else if(!hasNumber)
        {
            b.textContent = "Password should have atleast one number";
            return false;
        }
        else if(!hasSymbol)
        {
            b.textContent = "Password should have atleast one symbol";
            return false;
        }
    }
    else if(currentRole === 'patient')
    {

    }
    return true;
}
function validatepassword()
{
    const b = document.getElementById("passwordError");
    const password = h.value.trim();
    let size = password.length;
    const hasUppercase = /[A-Z]/.test(password);
    const hasNumber = /[0-9]/.test(password);
    const hasSymbol = /[!@#$%^&*(),.?":{}|<>]/.test(password);
    if(!hasUppercase)
    {
        b.textContent = "Password should have atleast one Capital character";
    }
    else if(!hasNumber)
    {
        b.textContent = "Password should have atleast one number";
    }
    else if(!hasSymbol)
    {
        b.textContent = "Password should have atleast one symbol";
    }
    else if(size>=32)
    {
        b.textContent = "Password can have max of 32chars only";
    }
    return;
}
</script>

</body>
</html>
